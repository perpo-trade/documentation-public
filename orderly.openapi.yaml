      type: object
      # TODO required
      properties:
        id:
          type: integer
          example: 12345
        message_type:
          type: string
          description: ORDER_FILLED
          example: "ORDER_FILLED"
        email:
          type: string
          description: email if bounded to the account
          example: test@perpo.trade
        application_id:
          type: string
          description: wallet address of the account
          example: "0x0f29bfb4c1bc9fea3f3be46bab6d795e22a6272354b136fde05f6b80cfcad546"
        title:
          type: string
          example: " Your order has been filled"
        type:
          type: string
          description: TRADE / SYSTEM
          example: "TRADE"
        level:
          type: string
          description: GENERAL / IMPORTANT
          example: "GENERAL"
        content_summary:
          type: string
          example: "Your order to buy 1 NEAR-PERP has been filled: 0.5/1 at 1.9876."
        content:
          type: string
          example: "<p>Your order to buy 1 NEAR-PERP has been filled: 0.5/1 at 1.9876.</p>"
        content_raw:
          required:
            - executed_price
            - executed_quantity
            - executed_timestamp
            - order_id
            - side
            - symbol
          type: object
          properties:
            symbol:
              type: string
              example: "PERP_NEAR_USDC"
            side:
              type: string
              example: "BUY"
            order_id:
              type: integer
              example: 1
            executed_price:
              type: number
              example: 1.9876
            executed_quantity:
              type: number
              example: 0.5
            executed_timestamp:
              type: integer
              example: 1567382401000
        mark_read:
          type: integer
          description: "1 = READ, 0 = UNREAD"
          example: 1
        operator:
          type: integer
          example: 1
        created_time:
          type: integer
          example: 1670425970373
        announcement_id:
          type: integer

