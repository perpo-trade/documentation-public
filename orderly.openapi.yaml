        - $ref: "#/components/schemas/BasicResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                total_released_trading_rewards_order:
                  type: number
                  example: 3591403.07726818
                  description: The sum of all confirmed $ORDER trading rewards order on Perpo level
                total_released_trading_rewards_escrow:
                  type: number
                  example: 0
                  description: The sum of all confirmed es$ORDER trading rewards order on Perpo level
                current_epoch:
                  type: number
                  example: 66
                rows:
                  type: array
                  items:
                    type: object
                    properties:
                      epoch_id:
                        type: number
                        example: 2
                      total_trader_score_major:
                        type: number
                        example: 8278.08333486
                        description: |
                          The total amount of all trader scores for every broker in this epoch.
                          This value is 0 for epoch == current epoch 

                          Note: This value can be updated during the 7 days grace period after an epoch has ended
                      total_trader_score_alts:
                        type: number
                        example: 20901.92612209
                        description: |
                          The total amount of all trader scores for every broker in this epoch.
                          This value is 0 for epoch == current epoch 

                          Note: This value can be updated during the 7 days grace period after an epoch has ended
                      epoch_token:
                        type: string
                        example: "ORDER"
                        description: Type of reward distributed for this epoch ($ORDER or es$ORDER)
                      reward_status:
                        type: string
                        example: "Confirmed"
                        description: |
                          - `Ongoing` = Current epoch in progress
                          - `Pending` = during the 7 days grace period where Perpo can stop/modify distribution.
                          - `Confirmed` = After the 7 days grace period, rewards are finalized and ready for users to claim.
                          - `0` = Future epoch
                      r_major:
                        type: number
                        example: 150000
                        description: |
                          The total amount of rewards Perpo distributed for this epoch.
                          This value is 0 for epoch == current epoch 

                          Note: This value for might be updated during the 7 days grace period after the current epoch has ended
                      r_alts:
                        type: number
                        example: 50000
                        description: |
                          The total amount of rewards Perpo distributed for this epoch.
                          This value is 0 for epoch == current epoch 

                          Note: This value for might be updated during the 7 days grace period after the current epoch has ended

