            schema:
              type: object
              properties:
                symbol:
                  type: string
                  description: "Symbol of the isolated position"
                  example: "PERP_ETH_USDC"
                amount:
                  type: string
                  description: "Amount of margin to add or reduce"
                  example: "3"
                type:
                  type: string
                  description: "Operation type"
                  enum:
                    - ADD
                    - REDUCE
                  example: "ADD"
              required:
                - symbol
                - amount
                - type
      responses:
