components:
  parameters:
    orderly_timestamp:
      name: perpo-timestamp
      in: header
      description: ""
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: "1649920583000"
    orderly_account_id:
      name: perpo-account-id
      in: header
      description: ""
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: 0x0f29bfb4c1bc9fea3f3be46bab6d795e22a6272354b136fde05f6b80cfcad546
    orderly_key:
      name: perpo-key
      in: header
      description: ""
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: ed25519:8tm7dnKYkSc3FzgPuJaw1wztr79eeZpN35nHW5pL5XhX
    orderly_signature:
      name: perpo-signature
      in: header
      description: ""
      required: true
      style: simple
      explode: false
      schema:
        type: string
      example: dG4bkKiqG0dUYLzViRZkvbI6Sy239JxAdNMIBxFZ4w030Jofr0ORV06GHtvXZkaZaWUXE+XAU3fnzKN/5fDeBQ==
    recv_window_header:
      name: x-recv-window
      in: header
      description: "Use this parameter to control the timeout threshold for placing order, unit in miliseconds"
      required: false
      schema:
        type: number
      example: 20
  schemas:
    BasicResponse:
      required:
        - success
      type: object
      properties:
        success:
          type: boolean
          example: true
        timestamp:
          type: integer
          example: 1702989203989
    AddSubAccountResponse:
      allOf:
        - $ref: "#/components/schemas/BasicResponse"
        - type: object
          required:
            - main_account_id
            - data
          properties:
            data:
              type: object
              required:
                - sub_account_id
                - description
              properties:
                sub_account_id:
                  type: number
                  example: 123
                description:
                  type: string
                  example: "abc"

    KlineHistoryResponse:
      type: object
      required:
        - s
        - o
        - c
        - h
        - l
        - v
        - a
        - t
      properties:
        s:
          type: string
          example: ok
        o:
          type: array
          items:
            type: number
          example:
            - 2.1050
            - 2.1550
            - 2.1050
            - 2.0285
            - 1.8000
            - 2.5500
            - 2.5500
        c:
          type: array
          items:
            type: number
          example:
            - 2.1000
            - 2.1550
            - 2.0570
            - 1.8600
            - 1.8000
            - 2.5500
            - 2.4800
        h:
          type: array
          items:
            type: number
          example:
            - 2.1550
            - 2.1550
            - 2.1050
            - 2.0285
            - 1.8000
            - 2.5500
            - 3.1750
        l:
          type: array
          items:
            type: number
          example:
            - 2.1000
            - 2.1550
            - 2.0200
            - 1.8500
            - 1.8000
            - 2.5500
            - 2.4800
        v:
          type: array
          items:
            type: number
          example:
            - 22.0
            - 0.0
            - 2.0
            - 3000.0
            - 26.0
            - 0.0
            - 2.0
        a:
          type: array
          items:
            type: number
          example:
            - 46.2000
            - 0.0000
            - 4.1140
            - 5635.0000
            - 46.8000
            - 0.0000
            - 6.1000
        t:
          type: array
          items:
            type: integer
            format: int64
          example:
            - 1761955200
            - 1762041600
            - 1762128000
            - 1762214400
            - 1762300800
            - 1762646400
            - 1762732800

    SubAccountResponse:
      allOf:
        - $ref: "#/components/schemas/BasicResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - main_account_id
                - rows
              properties:
                main_account_id:
                  type: string
                  example: "0x7ecc7eb7dc60d7fb5c5ea9cc637da1a46e265a744efda327b9914d7a21725bbf"
                rows:
                  type: array
                  items:
                    type: object
                    required:
                      - sub_account_id
                      - description
                    properties:
                      sub_account_id:
                        type: string
                        example: "0x86987799a1433266cacd80c817b670336d6779468f69defd6f8dc384a07b6457"
                      description:
                        type: string
                        example: "abc"

    SvNonceResponse:
      allOf:
        - $ref: "#/components/schemas/BasicResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              properties:
                nonce:
                  type: number
                  example: 14001212121234

    GetAccountStrategyVaultTransactionHistory:
      allOf:
        - $ref: "#/components/schemas/BasicResponse"
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - meta
                - rows
              properties:
                rows:
                  type: array
                  items:
                    type: object
                    required:
                      - vault_id
                      - created_time
                      - type
                      - status
                      - amount_change
                    properties:
                      vault_id:
                        type: string
                      created_time:
                        type: integer
                        example: 1734652800000
                      type:
                        type: string
                        example: "withdrawal"
                      status:
                        type: string
                        example: "pending"
                        description: "`pending` / `completed` / `failed`"
                      asset:
                        type: string
                        example: "USDC"
                      amount_change:
                        type: integer
                        example: 100.000000
                        description: |
                          All values are positive. When type = `deposit`, `amount_change` is shown normally. 
                          When type = `withdrawal`, only when status == `completed` return `amount_change` value, all other status return null.
                      shares_change:
                        type: integer
                        example: 88.009000
                        description: |
                          All values are positive. When type = `withdrawal`, `shares_change` is shown normally. 
                          When type = `deposit`, only when status == `completed` return `shares_change` value, all other status return null.
                meta:
                  $ref: "#/components/schemas/PaginationMeta"

    AggregatePositionsResponse:
      allOf:
